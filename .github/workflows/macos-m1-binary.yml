name: macos-m1-binary

on:
  workflow_dispatch:

jobs:
  build-macos-arm64-binary:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify architecture
        run: |
          set -e
          echo "Runner architecture: $(uname -m)"
          if [ "$(uname -m)" != "arm64" ]; then
            echo "Expected arm64 runner for macOS M1 binary build"
            exit 1
          fi

      - name: Build ztm binary
        run: |
          set -e
          ./build/deps.sh
          ./build/pipy.sh
          ls -lh bin/ztm

      - name: Package binary artifact
        run: |
          set -e
          mkdir -p dist
          cp bin/ztm dist/ztm
          tar -czf dist/ztm-macos-arm64.tar.gz -C dist ztm

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ztm-macos-arm64
          path: |
            dist/ztm
            dist/ztm-macos-arm64.tar.gz
